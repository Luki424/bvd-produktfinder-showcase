t.`]}),(0,k.jsxs)(`li`,{children:[(0,k.jsx)(`strong`,{children:`AGM:`}),` Elektrolyt im Glasvlies – auslaufsicher, sehr zyklenfest; Pflicht bei Start-Stop mit Rekuperation.`]}),(0,k.jsxs)(`li`,{children:[(0,k.jsx)(`strong`,{children:`GEL:`}),` gebundener Elektrolyt, tiefentladefest – stark in Versorgungs- und Reha-Anwendungen.`]}),(0,k.jsxs)(`li`,{children:[(0,k.jsx)(`strong`,{children:`LiFePO4 (Lithium):`}),` sehr leicht, hohe nutzbare Kapazität, sehr viele Zyklen – ideal für Bordnetze und Powersport; passendes Ladegerät beachten.`]})]})},{q:`Was bedeutet Kaltstartstrom (CCA/EN)?`,a:(0,k.jsxs)(`p`,{children:[`Der Kaltstartstrom gibt an, wie viel Strom die Batterie bei −18\xA0°C kurzzeitig zum Starten liefern kann (Prüfnorm EN). Dieselmotoren und Winterbetrieb brauchen höhere Werte. Faustregel: nie deutlich unter den Wert der Original-Batterie gehen – der `,(0,k.jsx)(`em`,{children:`Kaltstart-Berater`}),` liefert Richtwerte je Fahrzeugklasse.`]})},{q:`Was bedeutet C20, C10 oder C100 bei der Kapazität?`,a:(0,k.jsx)(`p`,{children:`Die C-Rate nennt die Entladedauer, auf die sich die Ah-Angabe bezieht (z.\xA0B. C20 = Entladung über 20 Stunden). Dieselbe Batterie hat bei C100 eine höhere nominelle Kapazität als bei C20. Beim Vergleich zweier Batterien immer auf die gleiche C-Rate achten.`})},{q:`Was bedeuten Vergleichstypen wie L3/H6, BCI 48 oder B24 (JIS)?`,a:(0,k.jsxs)(`p`,{children:[`Batteriegehäuse sind genormt: In Europa bezeichnen `,(0,k.jsx)(`strong`,{children:`L/LN/H-Codes`}),` (EN\xA050342) die Kastenmaße – z.\xA0B. L3/H6 = 278×175×190\xA0mm. `,(0,k.jsx)(`strong`,{children:`BCI-Gruppen`}),` (Nordamerika, z.\xA0B. Gruppe\xA048) und `,(0,k.jsx)(`strong`,{children:`JIS-Typen`}),` (Japan, z.\xA0B. B24, D23) beschreiben dieselben Gehäuse in anderen Systemen; bei Motorrädern sind `,(0,k.jsx)(`strong`,{children:`YTX/YB-Codes`}),` üblich. Der Produktfinder leitet diese Vergleichstypen aus den Gehäusemaßen ab – sie sind Richtwerte fürs schnelle Wiederfinden; Pollage und Anschluss immer zusätzlich prüfen. Tipp: Die Suche versteht diese Codes (z.\xA0B. „H6“ oder „YTX14“).`]})},{q:`Darf ich eine Start-Stop-Batterie durch eine normale ersetzen?`,a:(0,k.jsx)(`p`,{children:`Nein. In Start-Stop-Fahrzeugen muss mindestens die verbaute Technologie wieder eingesetzt werden: EFB durch EFB oder AGM, AGM immer durch AGM. Eine einfache SLI-Batterie altert dort extrem schnell. Bei vielen Fahrzeugen mit Batteriesensor (IBS/BEM) muss die neue Batterie zudem im Steuergerät angelernt/registriert werden – das übernimmt die Werkstatt.`})},{q:`Wie finde ich die richtige Ersatzbatterie?`,a:(0,k.jsxs)(`p`,{children:[`Am einfachsten über das Etikett der alten Batterie: Spannung, Ah, Kaltstartstrom, Maße und Pollage (Pluspol rechts\xA0=\xA0Schaltung\xA00, links\xA0=\xA01) ablesen. Mit dem `,(0,k.jsx)(`em`,{children:`Ersatzbatterie-Finder`}),` oben lassen sich alle 430 Varianten nach Einbaumaß, Ah und Kaltstartstrom durchsuchen – die Pollage dann auf der verlinkten BVD-Produktseite bzw. im Datenblatt prüfen.`]})},{q:`Warum LiFePO4 im Wohnmobil oder Boot?`,a:(0,k.jsxs)(`p`,{children:[`LiFePO4-Batterien sind über 50\xA0% leichter, vertragen deutlich mehr Ladezyklen und stellen rund 90\xA0% ihrer Kapazität nutzbar bereit (Blei: ~50\xA0%). Dafür brauchen sie lithiumfähige Ladetechnik (Ladebooster/Ladegerät). Der `,(0,k.jsx)(`em`,{children:`Energiebedarf-Rechner`}),` zeigt beide Auslegungen im Vergleich.`]})},{q:`Wie lagere und pflege ich Batterien richtig?`,a:(0,k.jsxs)(`p`,{children:[`Kühl, trocken und immer geladen lagern – Tiefentladung ist der häufigste Batteriekiller. Bei Saisonfahrzeugen (Motorrad, Wohnmobil, Rasentraktor) ein Erhaltungsladegerät anschließen, z.\xA0B. aus der Kategorie `,(0,k.jsx)(`em`,{children:`Zubehör`}),`. Vor dem Winter Ladezustand und Polanschlüsse prüfen.`]})},{q:`Was ist eine VdS-anerkannte Batterie?`,a:(0,k.jsxs)(`p`,{children:[`VdS-anerkannte Batterien erfüllen die Anforderungen für Sicherheitstechnik – etwa Brandmelde- und Einbruchmeldeanlagen oder Notbeleuchtung. Im Sortiment übernimmt das die Linie `,(0,k.jsx)(`em`,{children:`FLYBAT VRLA VdS`}),` (Kategorie Industriebatterien).`]})},{q:`Wohin mit der alten Batterie?`,a:(0,k.jsx)(`p`,{children:`Altbatterien gehören nie in den Hausmüll. Nach Batteriegesetz nehmen Händler Starterbatterien zurück (beim Kauf wird sonst Pfand fällig); alternativ Wertstoffhof. Blei-Batterien werden nahezu vollständig recycelt.`})},{q:`Wo finde ich Preise?`,a:(0,k.jsxs)(`p`,{children:[`Die BVD-Website nennt keine Preise – Konditionen gibt es auf Anfrage. Einfach Produkte über `,(0,k.jsx)(`em`,{children:`„Anfragen“`}),` in die Anfrageliste legen und den vorbereiteten Text per E-Mail an BVD senden, oder direkt anrufen: +49\xA07261\xA094832\xA00.`]})}],Je=[{label:`bvd-batterien.de – Website`,url:`https://www.bvd-batterien.de`},{label:`Downloads (Kataloge & Datenblätter)`,url:`https://bvd-batterien.de/downloads/`},{label:`Ansprechpartner`,url:`https://bvd-batterien.de/unternehmen/ansprechpartner/`},{label:`Kontaktformular`,url:`https://bvd-batterien.de/kontaktformular/`}];function Ye({onClose:e,productCount:t,variantCount:n}){return(0,k.jsx)(je,{title:`Info & FAQ`,onClose:e,wide:!0,children:(0,k.jsxs)(`div`,{className:`info`,children:[(0,k.jsx)(`h4`,{className:`detail__subhead`,children:`Über diesen Produktfinder`}),(0,k.jsxs)(`p`,{className:`info__text`,children:[`Dieser Produktfinder ist ein `,(0,k.jsx)(`strong`,{children:`inoffizieller Showcase`}),` über das Sortiment der BVD GmbH („The Battery Company“, Sinsheim): `,t,`\xA0Produktlinien mit`,` `,n,`\xA0Varianten aus den öffentlichen Produktseiten von bvd-batterien.de (Stand Juli 2026) – inklusive Typenprogrammen, Artikelnummern, Maßen und Datenblättern. Alle Angaben ohne Gewähr; verbindlich sind die Angaben der BVD GmbH bzw. der Hersteller.`]}),(0,k.jsxs)(`ul`,{className:`bullets`,children:[(0,k.jsxs)(`li`,{children:[(0,k.jsx)(`strong`,{children:`Ersatzbatterie-Finder:`}),` Varianten nach Einbaumaß, Ah und Kalts
