equipment. The chargers in the BVD range are designed for lead/AGM/EFB – please ask BVD about lithium suitability (+49 7261 94832 0)."," Kapazität (Ah) eingeben – z. B. 70 für eine PKW-Batterie.":" Enter capacity (Ah) – e.g. 70 for a car battery.","Faustregel-Richtwerte: Blei ~10 % der Kapazität (bis 30 %), LiFePO4 höher belastbar. Ladekennlinie, Pollage und Batteriezustand am Gerät bzw. Datenblatt prüfen; im Zweifel berät die BVD GmbH.":"Rule-of-thumb guide values: lead ~10 % of capacity (up to 30 %), LiFePO4 tolerates more. Check charge curve, terminal layout and battery condition on the device or data sheet; when in doubt, BVD GmbH will advise.","Werkzeuge & Berater":"Tools & advisors","Hochfrequenz · 12–48 V":"High-frequency · 12–48 V"," Für LiFePO4 sind die unten mit „LiFePO4“ markierten Geräte geeignet.":" The devices marked “LiFePO4” below are suitable for LiFePO4.","nur für Blei/AGM/EFB – nicht für LiFePO4":"for lead/AGM/EFB only – not for LiFePO4","Upgrade-Berater":"Upgrade advisor","SLI → EFB → AGM: zulässige Upgrades zur verbauten Batterie":"SLI → EFB → AGM: permitted upgrades for the installed battery","Verbaute Batterie-Technologie wählen und sehen, welche Ersatz- und Upgrade-Optionen zulässig sind – mit passenden Batterien aus dem Sortiment.":"Select the installed battery technology and see which replacement and upgrade options are permitted – with matching batteries from the range.","Verbaute Technologie":"Installed technology","SLI (Nassbatterie)":"SLI (flooded)","GEL (Versorgung)":"GEL (supply)","gleiche Stufe":"same level"," Im Katalog zeigen":" Show in catalogue","Mehr Zyklen und Start-Stop-fähig – sinnvoll bei viel Kurzstrecke.":"More cycles and start-stop capable – useful for lots of short trips.","Höchste Zyklenfestigkeit und rüttelfest – Reserve für viel Bordelektronik.":"Highest cycle strength and vibration-resistant – reserve for lots of on-board electronics.","Gleiche Technologie – Standard für einfache Start-Stop-Systeme.":"Same technology – the standard for simple start-stop systems.","Upgrade auf mehr Zyklen; gut bei Rekuperation und viel Bordelektronik.":"Upgrade for more cycles; good with recuperation and lots of on-board electronics.","Immer wieder AGM – höchste Blei-Stufe, Pflicht bei Rekuperation.":"Always AGM again – the highest lead tier, mandatory with recuperation.","Bewährt für zyklische Versorgungsanwendungen, tiefentladefest.":"Proven for cyclic supply applications, deep-discharge-proof.","Leichter, ~90 % nutzbar, sehr viele Zyklen – braucht lithiumfähige Ladetechnik.":"Lighter, ~90 % usable, very many cycles – needs lithium-capable charging equipment.","Bereits die leichteste und zyklenfesteste Technologie.":"Already the lightest and most cycle-resistant technology.","In Start-Stop-Fahrzeugen nie eine einfache SLI einsetzen.":"Never fit a simple SLI in start-stop vehicles.","Ohne Start-Stop ist ein Upgrade optional – meist genügt wieder SLI.":"Without start-stop an upgrade is optional – usually SLI again is enough.","Nie auf einfache SLI zurückrüsten – dort altert die Batterie extrem schnell.":"Never downgrade to a simple SLI – it ages extremely quickly there.","AGM-Upgrade ist meist zulässig; Fahrzeugvorgabe prüfen.":"An AGM upgrade is usually permitted; check the vehicle specification.","Nie auf EFB oder SLI zurückrüsten – das Batteriemanagement erwartet AGM.":"Never downgrade to EFB or SLI – the battery management expects AGM.","Innerhalb der Blei-Technik gibt es kein Upgrade über AGM hinaus.":"Within lead technology there is no upgrade beyond AGM.","LiFePO4-Wechsel: Ladebooster bzw. Ladegerät müssen lithiumfähig sein.":"Switching to LiFePO4: charge booster or charger must be lithium-capable.","Rückbau auf Blei nur mit Bedacht (Kapazität und Ladetechnik).":"Switch back to lead only with care (capacity and charging equipment).","Kein Upgrade nötig – auf passende Kapazität und lithiumfähige Ladung achten.":"No upgrade needed – ensure suitable capacity and lithium-capable charging.","Allgemeine Richtwerte – verbindlich sind Fahrzeughandbuch und das Etikett der verbauten Batterie. Bei Start-Stop mit Batteriesensor (IBS/BEM) die neue Batterie anlernen lassen.":"General guide values – the vehicle manual and the label of the installed battery are authoritative. With start-stop and a battery sensor (IBS/BEM), have the new battery registered.","Technik-Glossar":"Technical glossary","Kaltstartstrom (CCA/EN)":"Cold cranking amps (CCA/EN)","C-Rate (C20/C100)":"C-rate (C20/C100)","DoD (Entladetiefe)":"DoD (depth of discharge)","SoC (Ladezustand)":"SoC (state of charge)","Start-Stop / Rekuperation":"Start-stop / recuperation","IBS / BEM":"IBS / BEM","Pollage / Schaltung":"Terminal layout / polarity","Vergleichstyp (L/H, BCI, JIS, YTX)":"Cross-ref type (L/H, BCI, JIS, YTX)","Strom, den die Batterie bei −18 °C kurzzeitig zum Starten liefert (Prüfnorm EN 50342). Höhere Werte für Diesel und Winter.":"Current the battery briefly delivers for starting at −18 °C (EN 50342 test standard). Higher values for diesel and winter.","Ladungsmenge – grob „wie lange“ Strom fließt. Immer bezogen auf eine C-Rate.":"Amount of charge – roughly „how long“ current flows. Always relative to a C-rate.","Entladedauer, auf die sich die Ah-Angabe bezieht. Bei C100 wird eine höhere Kapazität genannt als bei C20.":"Discharge duration the Ah rating refers to. C100 states a higher capacity than C20.","Starter-Light-Ignition – klassische Nassbatterie ohne Start-Stop.":"Starting-Lighting-Ignition – classic flooded battery without start-stop.","Enhanced Flooded Battery – verstärkte Nassbatterie für einfache Start-Stop-Systeme.":"Enhanced Flooded Battery – reinforced flooded battery for simple start-stop systems.","Absorbent Glass Mat – Elektrolyt im Glasvlies, auslaufsicher und sehr zyklenfest; Pflicht bei Rekuperation.":"Absorbent Glass Mat – electrolyte in glass mat, leak-proof and highly cycle-resistant; mandatory with recuperation.","Elektrolyt als Gel gebunden, tiefentladefest – stark in Versorgungsanwendungen.":"Electrolyte bound as gel, deep-discharge-proof – strong in supply applications.","Ventilgeregelte Blei-Batterie (AGM/GEL), wartungsfrei und lageunabhängig.":"Valve-regulated lead battery (AGM/GEL), maintenance-free and position-independent.","Lithium-Eisenphosphat – leicht, ~90 % nutzbar, sehr viele Zyklen; braucht lithiumfähige Ladetechnik.":"Lithium iron phosphate – light, ~90 % usable, very many cycles; needs lithium-capable charging equipment.","Anteil der entnommenen Kapazität. Blei mag geringe DoD, LiFePO4 verträgt hohe.":"Share of capacity drawn. Lead prefers low DoD, LiFePO4 tolerates high DoD.","Aktueller Füllstand der Batterie in Prozent.":"Current charge level of the battery in percent.","Motor-Aus im Stand bzw. Rückgewinnung von Bremsenergie – erfordert EFB oder AGM.":"Engine-off when stopped and recovery of braking energy – requires EFB or AGM.","Batteriesensor bzw. -management; neue Batterie muss oft angelernt/registriert werden.":"Battery sensor or management; a new battery often needs to be registered.","Lage der Pole: Pluspol rechts = Schaltung 0, links = 1.":"Position of the terminals: positive on the right = layout 0, on the left = 1.","Genormte Gehäusemaße in verschiedenen Ländersystemen – Richtwerte fürs Wiederfinden.":"Standardised case dimensions in various national systems – guide values for lookup.","Pollage":"Polarity","Pluspol rechts":"Positive on right","Pluspol links":"Positive on left","Muss ich bei Reihen-/Parallelschaltung alle Batterien tauschen?":"Do I have to replace all batteries in a series/parallel connection?","Ja. Fällt in einem Reihen- oder Parallelsatz eine Batterie aus, sollten grundsätzlich alle Batterien des Satzes ersetzt werden – und zwar gleichen Typs, gleicher Kapazität und möglichst gleichen Alters. Eine einzelne neue Batterie neben gealterten führt zu ungleicher Belastung und verkürzt die Lebensdauer des ganzen Satzes (Richtlinie u. a. im VARTA-Bordnetzbuch, Kap. „Zusammenschaltung von Batterien“).":"Yes. If one battery in a series or parallel set fails, all batteries in the set should be replaced – of the same type, same capacity and ideally the same age. A single new battery next to aged ones leads to uneven loading and shortens the life of the whole set (guideline e.g. in the VARTA on-board network book, chapter “Interconnecting batteries”).","Reihen-/Parallelschaltung":"Series/parallel connection","Europäische Typnummer – genormte Nummer (z. B. 560 901 068), die eine Starterbatterie eindeutig kennzeichnet; steht auf dem Etikett.":"European Type Number – standardised number (e.g. 560 901 068) that uniquely identifies a starter battery; printed on the label.","Reihe erhöht die Spannung, Parallel die Kapazität. Beim Ausfall immer den ganzen Satz gleichen Typs/Alters tauschen.":"Series increases voltage, parallel increases capacity. On failure always replace the whole set of the same type/age.","Batteriebank-Rechner":"Battery bank calculator","Reihen-/Parallelschaltung für 12/24/48-V-Systeme berechnen":"Calculate series/parallel wiring for 12/24/48 V systems","Systemspannung und Wunschkapazität angeben – der Rechner zeigt die nötige Reihen-/Parallelschaltung und die Gesamtwerte.":"Enter system voltage and desired capacity – the calculator shows the required series/parallel wiring and the totals.","Systemspannung":"System voltage","Batteriespannung":"Battery voltage","Kapazität je Batterie (Ah)":"Capacity per battery (Ah)","Gewünschte Gesamtkapazität (Ah)":"Desired total capacity (Ah)","Batterien gesamt":"batteries total"," Systemspannung muss ein Vielfaches der Batteriespannung sein.":" System voltage must be a multiple of the battery voltage.","Diagramm schematisch gekürzt.":"Diagram shown schematically, truncated."," Alle Batterien müssen gleichen Typ, gleiche Kapazität und möglichst gleiches Alter haben – bei Ausfall den ganzen Satz tauschen.":" All batteries must be the same type, same capacity and ideally the same age – replace the whole set on failure."," Passende Kapazität im Katalog":" Show matching capacity in catalogue"," Kapazität je Batterie eingeben – z. B. 100 Ah.":" Enter capacity per battery – e.g. 100 Ah.","Schematische Verschaltung – fachgerechte Installation, Sicherungen und gleiche Kabellängen beachten; im Zweifel berät die BVD GmbH.":"Schematic wiring – ensure proper installation, fuses and equal cable lengths; when in doubt, BVD GmbH will advise.","optional":"optional","Sofort ab Lager zuerst":"In stock first"," sofort ab Lager":" in stock now","Marke, Art.-Nr., EAN/ETN, Vergleichstyp …":"Brand, art. no., EAN/ETN, cross-ref type …","Bordnetz-Assistent (Marine & Caravan)":"On-board network assistant (marine & caravan)","Ein paar Angaben zum Fahrzeug und zur Nutzung – der Assistent empfiehlt Aufbau, Technologie und Ladequellen fürs Bordnetz und verweist auf die passenden Rechner.":"A few details about the vehicle and how you use it – the assistant recommends the layout, technology and charging sources for the on-board network and points you to the right calculators.","Fahrzeugtyp":"Vehicle type","Wohnmobil / Caravan":"Motorhome / caravan","Boot / Marine":"Boat / marine","Nutzung":"Usage","Wochenende / kurz":"Weekend / short","Mehrwöchig / Urlaub":"Multi-week / holiday","Autark / Dauercamping":"Off-grid / long-term camping","Landstrom / Steckdose":"Shore power / mains socket","häufig verfügbar":"frequently available","selten / nie":"rarely / never","Solar geplant":"Solar planned","nein":"no","ja":"yes","Technologie":"Technology","Empfehlung":"Recommendation","Blei (AGM/GEL)":"Lead (AGM/GEL)","Empfohlene Versorgungstechnologie":"Recommended supply technology","Blei – AGM/GEL":"Lead – AGM/GEL","~90 % nutzbar, viele Zyklen, leicht – ideal bei häufiger Nutzung und wenig Landstrom.":"~90 % usable, many cycles, lightweight – ideal for frequent use and little shore power.","Robust und preisbewusst – gut bei regelmäßigem Landstrom-Anschluss.":"Robust and cost-conscious – good with a regular shore-power connection.","Ladequellen":"Charging sources","Landstrom-Ladegerät":"Shore-power charger","Mehrstufiges Ladegerät (lithiumfähig) – lädt die Versorgungsbatterie am Stellplatz bzw. Steg.":"Multi-stage charger (lithium-capable) – charges the auxiliary battery at the pitch or berth.","Mehrstufiges Ladegerät – lädt die Versorgungsbatterie am Stellplatz bzw. Steg.":"Multi-stage charger – charges the auxiliary battery at the pitch or berth.","Ladebooster (DC-DC / B2B)":"Charge booster (DC-DC / B2B)","Für LiFePO4 nötig – lädt die Versorgungsbatterie während der Fahrt schonend über die Lichtmaschine.":"Required for LiFePO4 – gently charges the auxiliary battery from the alternator while driving.","Empfohlen – lädt die Versorgungsbatterie während der Fahrt schonend über die Lichtmaschine.":"Recommended – gently charges the auxiliary battery from the alternator while driving.","Solar + MPPT-Laderegler":"Solar + MPPT charge controller","Autarke Nachladung – Solarleistung nach Tagesbedarf dimensionieren.":"Off-grid recharging – size the solar output to the daily demand.","Kernprinzipien":"Core principles","Getrennte Batteriekreise":"Separate battery circuits","Starterbatterie (Motorstart) und Versorgungsbatterie (Verbraucher) trennen – über Trennrelais oder DC-DC-Lader.":"Keep the starter battery (engine start) and the auxiliary battery (loads) separate – via an isolating relay or DC-DC charger.","Kapazität auslegen":"Size the capacity","Verbraucher × Nutzungsdauer bestimmt die nötige Kapazität – mit dem Energiebedarf-Rechner berechnen.":"Loads × usage time determine the required capacity – calculate it with the energy-demand calculator.","Lithiumfähig laden":"Charge with lithium-capable equipment","LiFePO4 braucht lithiumfähige Ladetechnik (Ladegerät, Booster, Solarregler).":"LiFePO4 needs lithium-capable charging equipment (charger, booster, solar controller).","Regelmäßig vollladen":"Charge fully on a regular basis","Blei mag regelmäßige Vollladung; Tiefentladung vermeiden, sonst sinkt die Lebensdauer.":"Lead likes regular full charging; avoid deep discharge or service life drops."," Energiebedarf berechnen":" Calculate energy demand"," Ladegeräte-Berater":" Charger advisor"," Versorgungsbatterien":" Supply batteries"," Ladetechnik":" Charging technology","Allgemeine Richtwerte fürs Bordnetz (u. a. angelehnt ans VARTA-Bordnetzbuch). Für die konkrete Auslegung – Kabelquerschnitte, Sicherungen, Trenntechnik – berät die BVD GmbH.":"General reference values for the on-board network (partly based on the VARTA on-board network guide). For the actual design – cable cross-sections, fuses, isolation technology – BVD GmbH will advise.","Bordnetz-Assistent":"On-board network assistant","Marine & Caravan: Aufbau, Technologie und Ladequellen":"Marine & caravan: layout, technology and charging sources","Verbraucher-Baukasten":"Appliance kit","Typische Bordverbraucher wählen – die Auswahl wird in den Energiebedarf-Rechner übernommen (Richtwerte, dort anpassbar).":"Choose typical on-board appliances – the selection is transferred to the energy-demand calculator (reference values, adjustable there).","Kühlbox / Kompressor-Kühlschrank":"Cool box / compressor fridge","Beleuchtung (LED)":"Lighting (LED)","Wasserpumpe":"Water pump","Handy/Laptop laden":"Charge phone/laptop","Heizungsgebläse":"Heater fan","Wechselrichter (Küche)":"Inverter (kitchen)","Navigation / Plotter":"Navigation / plotter"," Anrufen":" Call"," Blei-Bank auslegen":" Size lead-acid bank"," LiFePO4-Bank auslegen":" Size LiFePO4 bank","Maße (L×B×H)":"Dimensions (L×W×H)","Gewicht":"Weight"," Nur Unterschiede":" Only differences","Altbatterie & Pflege":"Used batteries & care","Altbatterie-Rücknahme & Pfand":"Used-battery return & deposit","Batterie-Pflege & Lagerung":"Battery care & storage","Pfand auf Fahrzeugbatterien":"Deposit on vehicle batteries","Beim Kauf einer Starter-/Fahrzeugbatterie ohne Rückgabe einer Altbatterie wird ein gesetzlicher Pfand von 7,50 € erhoben (Batteriegesetz). Gibst du die Altbatterie zurück, wird der Pfand erstattet.":"When buying a starter/vehicle battery without returning an old one, a statutory deposit of €7.50 is charged (German Battery Act). If you return the old battery, the deposit is refunded.","Rücknahme beim Handel":"Take-back by the retailer","Der Handel ist zur kostenlosen Rücknahme von Altbatterien verpflichtet – Fahrzeug- und Industriebatterien nimmt die BVD GmbH direkt zurück.":"Retailers are obliged to take back used batteries free of charge – BVD GmbH takes back vehicle and industrial batteries directly.","Nicht in den Hausmüll":"Not in household waste","Altbatterien gehören nie in den Restmüll (Symbol: durchgestrichene Mülltonne). Sie werden fachgerecht recycelt, Blei und Wertstoffe kommen zurück in den Kreislauf.":"Used batteries never belong in residual waste (symbol: crossed-out wheelie bin). They are recycled properly; lead and valuable materials go back into the cycle.","Geräte- & Portable-Batterien":"Device & portable batteries","Kleinere Geräte- und Portable-Batterien lassen sich kostenlos an Sammelstellen und im Handel abgeben (Rücknahmesystem GRS Batterien).":"Smaller device and portable batteries can be handed in free of charge at collection points and retailers (GRS Batterien take-back system).","Lithium-Batterien sichern":"Secure lithium batteries","Bei Lithium-/LiFePO4-Batterien die Pole abkleben und beschädigte Zellen nicht selbst öffnen – Kurzschluss- und Brandgefahr. Im Zweifel die BVD GmbH ansprechen.":"With lithium/LiFePO4 batteries, tape over the terminals and do not open damaged cells yourself – risk of short circuit and fire. When in doubt, contact BVD GmbH.","Vor dem Winter prüfen":"Check before winter","Kälte senkt die verfügbare Kapazität und fordert die Batterie beim Start. Ladezustand vor der kalten Jahreszeit prüfen und bei Bedarf nachladen.":"Cold reduces the available capacity and stresses the battery when starting. Check the state of charge before the cold season and recharge if needed.","Bei Standzeit nachladen":"Recharge during idle periods","Saisonfahrzeuge (Motorrad, Wohnmobil, Oldtimer) profitieren von einem Erhaltungslader. Bleibatterien nie entladen stehen lassen – sonst droht Sulfatierung.":"Seasonal vehicles (motorcycle, motorhome, classic car) benefit from a trickle charger. Never leave lead batteries discharged – otherwise sulfation can occur.","Tiefentladung vermeiden":"Avoid deep discharge","Blei mag regelmäßige Vollladung und keine Tiefentladung. LiFePO4 verträgt hohe Entladetiefe, sollte zur Lagerung aber bei rund 50–60 % Ladezustand liegen.":"Lead likes regular full charging and no deep discharge. LiFePO4 tolerates a high depth of discharge but should be stored at around 50–60 % state of charge.","Kurzstrecke ausgleichen":"Compensate for short trips","Viele Kurzstrecken laden die Batterie nicht voll. Gelegentliches Nachladen mit einem Ladegerät verlängert die Lebensdauer – siehe Ladegeräte-Berater.":"Lots of short trips don't fully charge the battery. Occasional recharging with a charger extends the service life – see the charger advisor.","Pole & Kontakt pflegen":"Maintain terminals & contact","Pole sauber halten und leicht mit Polfett schützen. Feste, korrosionsfreie Verbindungen sichern einen zuverlässigen Start und schonen die Bordelektronik.":"Keep terminals clean and protect them lightly with terminal grease. Firm, corrosion-free connections ensure a reliable start and protect the on-board electronics."," Datenblatt drucken":" Print data sheet","Datenblatt · ":"Data sheet · ","Verfügbarkeit: ":"Availability: "," · Marke: ":" · Brand: ","Anwendungen: ":"Applications: "," — Produktdaten von der öffentlichen BVD-Website (bvd-batterien.de); Preise & Verfügbarkeit auf Anfrage. Inoffizieller Showcase.":" — Product data from the public BVD website (bvd-batterien.de); prices & availability on request. Unofficial showcase.","Zu Favoriten":"Add to favourites","Aus Favoriten entfernen":"Remove from favourites"," Favoriten e Start-Stop-Systeme und hohe Zyklenlast.`]}),(0,A.jsxs)(`li`,{children:[(0,A.jsx)(`strong`,{children:`AGM:`}),` Elektrolyt im Glasvlies – auslaufsicher, sehr zyklenfest; Pflicht bei Start-Stop mit Rekuperation.`]}),(0,A.jsxs)(`li`,{children:[(0,A.jsx)(`strong`,{children:`GEL:`}),` gebundener Elektrolyt, tiefentladefest – stark in Versorgungs- und Reha-Anwendungen.`]}),(0,A.jsxs)(`li`,{children:[(0,A.jsx)(`strong`,{children:`LiFePO4 (Lithium):`}),` sehr leicht, hohe nutzbare Kapazität, sehr viele Zyklen – ideal für Bordnetze und Powersport; passendes Ladegerät beachten.`]})]})},{q:`Was bedeutet Kaltstartstrom (CCA/EN)?`,a:(0,A.jsxs)(`p`,{children:[`Der Kaltstartstrom gibt an, wie viel Strom die Batterie bei −18\xA0°C kurzzeitig zum Starten liefern kann (Prüfnorm EN). Dieselmotoren und Winterbetrieb brauchen höhere Werte. Faustregel: nie deutlich unter den Wert der Original-Batterie gehen – der `,(0,A.jsx)(`em`,{children:`Kaltstart-Berater`}),` liefert Richtwerte je Fahrzeugklasse.`]})},{q:`Was bedeutet C20, C10 oder C100 bei der Kapazität?`,a:(0,A.jsx)(`p`,{children:`Die C-Rate nennt die Entladedauer, auf die sich die Ah-Angabe bezieht (z.\xA0B. C20 = Entladung über 20 Stunden). Dieselbe Batterie hat bei C100 eine höhere nominelle Kapazität als bei C20. Beim Vergleich zweier Batterien immer auf die gleiche C-Rate achten.`})},{q:`Was bedeuten Vergleichstypen wie L3/H6, BCI 48 oder B24 (JIS)?`,a:(0,A.jsxs)(`p`,{children:[`Batteriegehäuse sind genormt: In Europa bezeichnen `,(0,A.jsx)(`strong`,{children:`L/LN/H-Codes`}),` (EN\xA050342) die Kastenmaße – z.\xA0B. L3/H6 = 278×175×190\xA0mm. `,(0,A.jsx)(`strong`,{children:`BCI-Gruppen`}),` (Nordamerika, z.\xA0B. Gruppe\xA048) und `,(0,A.jsx)(`strong`,{children:`JIS-Typen`}),` (Japan, z.\xA0B. B24, D23) beschreiben dieselben Gehäuse in anderen Systemen; bei Motorrädern sind `,(0,A.jsx)(`strong`,{children:`YTX/YB-Codes`}),` üblich. Der Produktfinder leitet diese Vergleichstypen aus den Gehäusemaßen ab – sie sind Richtwerte fürs schnelle Wiederfinden; Pollage und Anschluss immer zusätzlich prüfen. Tipp: Die Suche versteht diese Codes (z.\xA0B. „H6“ oder „YTX14“).`]})},{q:`Wie funktioniert die Fahrzeug-Suche mit FIN/VIN?`,a:(0,A.jsxs)(`p`,{children:[`Die 17-stellige FIN (Fahrzeug-Identifizierungsnummer, engl. VIN) steht im Fahrzeugschein (Feld\xA0E). Daraus lassen sich per ISO-Standard `,(0,A.jsx)(`strong`,{children:`Hersteller`}),` (WMI, Zeichen 1–3) und `,(0,A.jsx)(`strong`,{children:`Modelljahr`}),` (Zeichen 10) ablesen – die verbaute Batterie codiert sie jedoch nicht. Unsere Fahrzeug-Suche nutzt die FIN daher als Einstieg und führt dann über Modell, Kraftstoff und Start-Stop-Ausstattung zu Klassen-Richtwerten mit passenden Batterien aus dem Sortiment. Verbindlich bleiben Fahrzeughandbuch bzw. das Etikett der verbauten Batterie.`]})},{q:`Darf ich eine Start-Stop-Batterie durch eine normale ersetzen?`,a:(0,A.jsx)(`p`,{children:`Nein. In Start-Stop-Fahrzeugen muss mindestens die verbaute Technologie wieder eingesetzt werden: EFB durch EFB oder AGM, AGM immer durch AGM. Eine einfache SLI-Batterie altert dort extrem schnell. Bei vielen Fahrzeugen mit Batteriesensor (IBS/BEM) muss die neue Batterie zudem im Steuergerät angelernt/registriert werden – das übernimmt die Werkstatt.`})},{q:`Wie finde ich die richtige Ersatzbatterie?`,a:(0,A.jsxs)(`p`,{children:[`Am einfachsten über das Etikett der alten Batterie: Spannung, Ah, Kaltstartstrom, Maße und Pollage (Pluspol rechts\xA0=\xA0Schaltung\xA00, links\xA0=\xA01) ablesen. Mit dem `,(0,A.jsx)(`em`,{children:`Ersatzbatterie-Finder`}),` oben lassen sich alle 430 Varianten nach Einbaumaß, Ah und Kaltstartstrom durchsuchen – die Pollage dann auf der verlinkten BVD-Produktseite bzw. im Datenblatt prüfen.`]})},{q:`Warum LiFePO4 im Wohnmobil oder Boot?`,a:(0,A.jsxs)(`p`,{children:[`LiFePO4-Batterien sind über 50\xA0% leichter, vertragen deutlich mehr Ladezyklen und stellen rund 90\xA0% ihrer Kapazität nutzbar bereit (Blei: ~50\xA0%). Dafür brauchen sie lithiumfähige Ladetechnik (Ladebooster/Ladegerät). Der `,(0,A.jsx)(`em`,{children:`Energiebedarf-Rechner`}),` zeigt beide Auslegungen im Vergleich.`]})},{q:`Wie lagere und pflege ich Batterien richtig?`,a:(0,A.jsxs)(`p`,{children:[`Kühl, trocken und immer geladen lagern – Tiefentladung ist der häufigste Batteriekiller. Bei Saisonfahrzeugen (Motorrad, Wohnmobil, Rasentraktor) ein Erhaltungsladegerät anschließen, z.\xA0B. aus der Kategorie `,(0,A.jsx)(`em`,{children:`Zubehör`}),`. Vor dem Winter Ladezustand und Polanschlüsse prüfen.`]})},{q:`Was ist eine VdS-anerkannte Batterie?`,a:(0,A.jsxs)(`p`,{children:[`VdS-anerkannte Batterien erfüllen die Anforderungen für Sicherheitstechnik – etwa Brandmelde- und Einbruchmeldeanlagen oder Notbeleuchtung. Im Sortiment übernimmt das die Linie `,(0,A.jsx)(`em`,{children:`FLYBAT VRLA VdS`}),` (Kategorie Industriebatterien).`]})},{q:`Wohin mit der alten Batterie?`,a:(0,A.jsx)(`p`,{children:`Altbatterien gehören nie in den Hausmüll. Nach Batteriegesetz nehmen Händler Starterbatterien zurück (beim Kauf wird sonst Pfand fällig); alternativ Wertstoffhof. Blei-Batterien werden nahezu vollständig recycelt.`})},{q:`Wo finde ich Preise?`,a:(0,A.jsxs)(`p`,{children:[`Die BVD-Website nennt keine Preise – Konditionen gibt es auf Anfrage. Einfach Produkte über `,(0,A.jsx)(`em`,{children:`„Anfragen“`}),` in die Anfrageliste legen und den vorbereiteten Text per E-Mail an BVD senden, oder direkt anrufen: +49\xA07261\xA094832\xA00.`]})},{q:`Muss ich bei Reihen-/Parallelschaltung alle Batterien tauschen?`,a:(0,A.jsx)(`p`,{children:`Ja. Fällt in einem Reihen- oder Parallelsatz eine Batterie aus, sollten grundsätzlich alle Batterien des Satzes ersetzt werden – und zwar gleichen Typs, gleicher Kapazität und möglichst gleichen Alters. Eine einzelne neue Batterie neben gealterten führt zu ungleicher Belastung und verkürzt die Lebensdauer des ganzen Satzes (Richtlinie u. a. im VARTA-Bordnetzbuch, Kap. „Zusammenschaltung von Batterien“).`})}],ft=[{labe
